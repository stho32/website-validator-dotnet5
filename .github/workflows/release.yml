name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Calculate next version
      id: bump
      run: |
        # Find latest semver tag
        LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v0.0.0"
        fi
        echo "Latest tag: $LATEST_TAG"

        # Parse version
        VERSION="${LATEST_TAG#v}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        # Determine bump type
        BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
        echo "Bump type: $BUMP_TYPE"

        # Calculate new version
        case "$BUMP_TYPE" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        NEW_TAG="v${NEW_VERSION}"

        echo "New version: $NEW_VERSION"
        echo "New tag: $NEW_TAG"

        # Check if tag already exists
        if git tag --list | grep -q "^${NEW_TAG}$"; then
          echo "Tag $NEW_TAG already exists, skipping release"
          echo "should_release=false" >> "$GITHUB_OUTPUT"
        else
          echo "should_release=true" >> "$GITHUB_OUTPUT"
        fi

        echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build ${{ matrix.OUTPUTDIR }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        include:
        - os: macos-latest
          RUNTIMEID: osx-x64
          OUTPUTDIR: website-validator-osx-x64
        - os: ubuntu-latest
          RUNTIMEID: linux-x64
          OUTPUTDIR: website-validator-linux-x64
        - os: windows-latest
          RUNTIMEID: win-x64
          OUTPUTDIR: website-validator-win-x64

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore
      working-directory: Source

    - name: Test
      run: dotnet test --configuration Release --verbosity normal
      working-directory: Source

    - name: Publish
      run: dotnet publish WebsiteValidator/WebsiteValidator.csproj -c Release -o ${{ matrix.OUTPUTDIR }} -p:PublishReadyToRun=true --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:UseAppHost=true -r ${{ matrix.RUNTIMEID }} -p:Version=${{ needs.prepare.outputs.version }}
      working-directory: Source

    - name: Zip output (Linux/macOS)
      if: runner.os != 'Windows'
      run: zip -r ${{ matrix.OUTPUTDIR }}.zip ./Source/${{ matrix.OUTPUTDIR }}/

    - name: Zip output (Windows)
      if: runner.os == 'Windows'
      run: Compress-Archive -Path ./Source/${{ matrix.OUTPUTDIR }}/* -DestinationPath ${{ matrix.OUTPUTDIR }}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.OUTPUTDIR }}
        path: ${{ matrix.OUTPUTDIR }}.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-and-release]
    if: needs.prepare.outputs.should_release == 'true'
    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ needs.prepare.outputs.tag }}
        git push origin ${{ needs.prepare.outputs.tag }}

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        name: Release ${{ needs.prepare.outputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/**/*.zip
